  Sell-Price-To-Low: "{prefix}<red>Your sell price is too low the minimum is <green>$10<red>."
  Sell-Price-To-High: "{prefix}<red>Your sell price is too high the maximum is <green>$1000000<red>."
  Bid-Price-To-Low: "{prefix}<red>Your starting bid price is too low the minimum is <green>$100<red>."
  Bid-Price-To-High: "{prefix}<red>Your starting bid price is too high the maximum is <green>$1000000<red>."
  Bought-Item: "{prefix}<gray>You have just bought an item for <green>$%price%<gray>."
  Win-Bidding: "{prefix}<gray>You have just won a bid for <green>$%price%<gray>. Do /Ah Collect to collect your winnings."
  Player-Bought-Item: "{prefix}<gray>%player% has bought your item for <green>$%price%."
  Someone-Won-Players-Bid: "{prefix}<gray>%player% has won your item with a bid of <green>$%price%."
  Added-Item-To-Auction: "{prefix}<gray>You have just added an item to the crazy auctions for <green>$%price%<gray>."
  Bid-Msg: "{prefix}<gray>You have just bid <green>$%Bid% <gray>on that item."
  Selling-Disabled: "{prefix}<red>The selling option is disabled."
  Bidding-Disabled: "{prefix}<red>The bidding option is disabled."
  Book-Not-Allowed: "{prefix}<red>That book is not able to be sold in this auction house!"
  Migration:
    # A list of available placeholders: {file}, {type}, {reason}
    Error: "{prefix}<red>We could not migrate <green>{file} <red>using <green>{type} <red>migration for <green>{reason}."
    # A list of available placeholders: {prefix}
    Not-Available: "{prefix}<green>This migration type is not available."
    # A list of available placeholders: {succeeded_amount}, {failed_amount}, {time}, {type}, {files}
    #
    # {files} will output multiple crates if migrating from another plugin
    Success:
      - "<bold><gold>━━━━━━━━━━━━━━━━━━━ Migration Stats ━━━━━━━━━━━━━━━━━━━</gold></bold>"
      - "<dark_gray>»</dark_gray> <green>Successful Conversions: "
      - " ⤷ {succeeded_amount}</green>"
      - "<dark_gray>»</dark_gray> <red>Failed Conversions: "
      - " ⤷ {failed_amount}</red>"
      - ""
      - "<red>Conversion Time: <yellow>{time}"
      - "<red>Conversion Type: <yellow>{type}"
      - ""
      - "<red>Converted Files:"
      - "{files}"
      - ""
      - "<bold><gold>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gold></bold>"
  Help-Menu:
    - "<yellow>-- <gold>Crazy Auctions Help <yellow>--"
    - "<blue>/Ah - <yellow>Opens the crazy auction."
    - "<blue>/Ah View <Player> - <yellow>See what a player is selling."
    - "<blue>/Ah Sell/Bid <Price> [Amount of items] - <yellow>List the item you are holding on the crazy auction."
    - "<blue>/Ah Expired/Collect - <yellow>View and manage your canceled and expired items."
    - "<blue>/Ah Listed - <yellow>View and manage the items you are selling."
    - "<blue>/Ah Help - <yellow>View this help menu."