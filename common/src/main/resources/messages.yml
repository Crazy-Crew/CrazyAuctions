Messages:
  Players-Only: "{prefix}<red>Only players can use this command."
  Failed-To-Open-Inventory: "{prefix}<red>Failed to open inventory."
  Reload: "{prefix}<gray>You have just reloaded the Crazy Auctions Files."
  Need-More-Money: "{prefix}<red>You are in need of <green>$%money_needed%<red>."
  Inventory-Full: "{prefix}<red>Your inventory is too full. Please open up some space to buy that."
  No-Permission: "{prefix}<red>You do not have permission to use that command!"
  Not-Online: "{prefix}<red>That player is not online."
  Doesnt-Have-Item-In-Hand: "{prefix}<red>You must have an item in your hand."
  Not-A-Number: "{prefix}<red>%arg% is not a number."
  Got-Item-Back: "{prefix}<gray>Your item has been returned."
  Cancelled-Item: "{prefix}<gray>You have canceled an item on the auction list, return your items with /ah expired."
  Item-Has-Expired: "{prefix}<gray>An item you have in the Crazy Auctions has expired."
  Admin-Force-Cancelled: "{prefix}<gray>You have force canceled a sale."
  Admin-Force-Cancelled-All: "{prefix}<gray>You have force canceled all sales."
  Admin-Force-Cancelled-To-Player: "{prefix}<red>One of your items was force canceled by an Admin."
  Item-Doesnt-Exist: "{prefix}<red>That item isn't in the crazy auctions any more."
